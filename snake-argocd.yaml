apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snake-game
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/lavalex/snake-gitops.git
    path: .
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: snake-game
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true
    syncOptions:
      - PruneLast=true
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 1
        maxDuration: 3m0s

